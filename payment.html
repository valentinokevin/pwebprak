<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=B612:wght@400;700&family=Italiana&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="style.css">
    
    <title>Pembayaran - Ambatysm</title>
</head>

<body>

    <!-- Page Header -->
    <div class="shop-header">
        <a href="checkout.html" class="shop-header__btn">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h1 class="shop-header__title">PEMBAYARAN</h1>
        <div style="width: 40px;"></div>
    </div>

    <!-- Payment Content -->
    <div class="payment-container">
        
        <div class="payment-method-badge" id="paymentMethodBadge">
            <i class="bi bi-qr-code"></i>
            <span>QRIS</span>
        </div>

        <!-- QR Code Area -->
        <div class="payment-qr">
            <div class="payment-qr__box" id="qrCodeBox">
                <div class="payment-qr__placeholder">
                    <i class="bi bi-qr-code-scan"></i>
                    <span>Scan QR Code</span>
                </div>
                <div class="payment-qr__pulse"></div>
            </div>
        </div>

        <!-- Countdown Timer -->
        <div class="payment-timer">
            <p class="payment-timer__text">Selesaikan Pembayaran Sebelum</p>
            <div class="payment-timer__countdown" id="countdownTimer">
                <span class="payment-timer__digits" id="timerMinutes">10</span>
                <span class="payment-timer__separator">:</span>
                <span class="payment-timer__digits" id="timerSeconds">00</span>
            </div>
            <div class="payment-timer__bar">
                <div class="payment-timer__progress" id="timerProgress"></div>
            </div>
        </div>

        <!-- Total Amount -->
        <div class="payment-amount">
            <span class="payment-amount__label">Total Pembayaran</span>
            <span class="payment-amount__value" id="paymentTotal">Rp 1.840.000</span>
        </div>

        <!-- Confirm Button -->
        <button class="payment-confirm-btn" id="confirmPaymentBtn" onclick="confirmPayment()">
            <span class="payment-confirm-btn__text">Konfirmasi Pembayaran</span>
            <i class="bi bi-check-circle"></i>
        </button>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initPaymentPage();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=B612:wght@400;700&family=Italiana&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="style.css">
    
    <title>Keranjang Belanja - Ambatysm</title>
</head>

<body>

    <!-- Page Header -->
    <div class="shop-header">
        <a href="index.html" class="shop-header__btn" id="cartCloseBtn">
            <i class="bi bi-x-lg"></i>
        </a>
        <h1 class="shop-header__title">KERANJANG BELANJA</h1>
        <a href="#" class="shop-header__btn">
            <i class="bi bi-search"></i>
        </a>
    </div>

    <!-- Cart Items Container -->
    <div class="cart-container" id="cartItemsContainer">
        <!-- Items will be rendered by JS -->
    </div>

    <!-- Empty Cart State -->
    <div class="cart-empty" id="cartEmpty" style="display: none;">
        <i class="bi bi-cart-x"></i>
        <h3>Keranjang Kosong</h3>
        <p>Belum ada produk di keranjang belanja kamu</p>
        <a href="index.html" class="cart-empty__btn">Mulai Belanja</a>
    </div>

    <!-- Sticky Bottom Bar -->
    <div class="cart-bottom" id="cartBottom">
        <div class="cart-bottom__total">
            <span class="cart-bottom__label">TOTAL :</span>
            <span class="cart-bottom__price" id="cartTotalPrice">Rp 0</span>
        </div>
        <a href="#" class="cart-bottom__checkout" id="checkoutBtn" onclick="goToCheckout(); return false;">CHECKOUT</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initCartPage();
        });
    </script>
</body>
</html>

<html lang="id">

<head>

    <title>Daftar - Ambatysm</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-white py-3 sticky-top shadow-sm">
        <div class="container-fluid px-4 d-flex justify-content-between align-items-center position-relative">
            <div class="d-flex align-items-center gap-4">
                <a href="login.html" class="text-dark text-decoration-none d-flex align-items-center gap-2">
                    <i class="bi bi-arrow-left fs-3"></i>
                    <span class="d-none d-md-inline" style="font-size: 15px;">Back</span>
                </a>
            </div>

            <a class="navbar-brand position-absolute top-50 start-50 translate-middle m-0" href="index.html">
                <span class="text-uppercase font-italiana" style="letter-spacing: 2.5px; font-size: 26px; color: black;">
                    Ambatysm
                </span>
            </a>

            <div class="d-flex align-items-center gap-4">
                <a href="#offcanvasSearch" data-bs-toggle="offcanvas" role="button" aria-controls="offcanvasSearch" class="text-dark text-decoration-none d-flex align-items-center gap-2">
                    <i class="bi bi-search fs-5"></i>
                    <span class="d-none d-md-inline" style="font-size: 15px;">Search</span>
                </a>
                
                <a href="login.html" class="text-dark text-decoration-none">
                    <i class="bi bi-person fs-4"></i>
                </a>
            </div>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasMenu" aria-labelledby="offcanvasMenuLabel" style="width: 400px; max-width: 100vw;">
        <div class="offcanvas-header p-4">
            <button type="button" class="btn text-dark text-decoration-none d-flex align-items-center gap-2 bg-transparent border-0 p-0" data-bs-dismiss="offcanvas" aria-label="Close">
                <i class="bi bi-x fs-3"></i> 
                <span style="font-size: 15px;">Close</span>
            </button>
        </div>
        <div class="offcanvas-body p-4 pt-2">
            <div class="d-flex flex-column gap-3 mb-5">
                <a href="./brandnew/" class="text-dark text-decoration-none fs-5">Brand New</a>
                <a href="./men/" class="text-dark text-decoration-none fs-5">Men</a>
                <a href="./women/" class="text-dark text-decoration-none fs-5">Women</a>
                <a href="./custom/" class="text-dark text-decoration-none fs-5">Custom</a>
                <a href="./sales/" class="text-dark text-decoration-none fs-5">On Sales</a>
            </div>
            <hr class="text-secondary opacity-25">
            <div class="mt-4 mb-5">
                <p class="text-dark mb-2" style="font-size: 14px;">Can we help you? Call Us</p>
                <p class="text-dark" style="font-size: 14px;">0018 0301 2888</p>
            </div>
        </div>
    </div>

    <div class="offcanvas offcanvas-top h-100" tabindex="-1" id="offcanvasSearch" aria-labelledby="offcanvasSearchLabel">
        <div class="offcanvas-header p-4 d-flex justify-content-between align-items-center">
            <button type="button" class="btn-close text-reset m-0" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            <span class="text-uppercase mx-auto font-italiana" style="letter-spacing: 2.5px; font-size: 26px; color: black;">Ambatysm</span>
            <div style="width: 32px;"></div> 
        </div>
        <div class="offcanvas-body px-0">
            <div class="container mt-2">
                <div class="row justify-content-center">
                    <div class="col-md-8 d-flex align-items-center gap-3">
                        <div class="position-relative flex-grow-1">
                            <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-4 text-secondary"></i>
                            <input type="text" id="inputPencarian" class="form-control rounded-pill py-3 border-dark w-100" placeholder="Search for 'Gifts'" style="font-size: 15px; padding-left: 50px;">
                        </div>
                        <span class="text-danger fw-bold text-uppercase" style="cursor: pointer; font-size: 14px; letter-spacing: 1px;">Search</span>
                    </div>
                </div>
                <div class="row justify-content-center mt-4">
                    <div class="col-md-10 d-flex flex-wrap justify-content-center align-items-center gap-4">
                        <span class="text-uppercase" style="font-size: 11px; font-weight: bold; letter-spacing: 1px; color: #777;">Trending Searches</span>
                        <a href="#" class="text-dark text-decoration-none" style="font-size: 14px;" onclick="isiPencarian('kemeja'); return false;">kemeja</a>
                        <a href="#" class="text-dark text-decoration-none" style="font-size: 14px;" onclick="isiPencarian('jaket'); return false;">jaket</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <main class="auth-page mt-4">
        <h1 class="auth-page__title">REGISTER</h1>
        <p class="auth-page__subtitle">Please fill in the information below:</p>

        <div class="auth-card">
            <form id="registerForm" novalidate>
                <div class="form-group mb-3">
                    <label for="regFullName">Nama Lengkap</label>
                    <input type="text" id="regFullName" placeholder="Nama Lengkap" autocomplete="name" required>
                    <div class="form-error" id="regFullNameError"></div>
                </div>

                <div class="form-group mb-3">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" placeholder="Email" autocomplete="email" required>
                    <div class="form-error" id="regEmailError"></div>
                </div>

                <div class="form-group mb-3">
                    <label for="regPassword">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="regPassword" placeholder="Password" autocomplete="new-password" required>
                    </div>
                    <div class="form-error" id="regPasswordError"></div>
                </div>

                <button type="submit" class="btn-primary" id="registerBtn">
                    <span class="btn-text">BUAT AKUN SAYA</span>
                </button>
            </form>

    <div class="auth-switch">
        Sudah punya akun Ambatysm? <a href="login.html">Masuk</a>
    </div>
</div>

        <div class="social-divider">Atau daftar dengan</div>

        <div class="social-buttons">
            <button class="btn-social btn-social--facebook" onclick="Toast.info('Facebook', 'Daftar dengan Facebook akan segera tersedia!')">

                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                </svg>
                Daftar Dengan Facebook
            </button>

            <button class="btn-social btn-social--google" id="googleSignInBtn" onclick="handleGoogleSignIn()">
                <svg class="btn-social__icon" width="18" height="18" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4" />

                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" />
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
                </svg>
                Daftar Dengan Google
            </button>

            <button class="btn-social btn-social--instagram" onclick="Toast.info('Instagram', 'Daftar dengan Instagram akan segera tersedia!')">
                <svg class="btn-social__icon" width="18" height="18" viewBox="0 0 24 24" fill="white">
                    <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z" />
                </svg>
                Daftar Dengan Instagram
            </button>
        </div>
    </main>

    <script src="firebase-config.js"></script>

</html>
